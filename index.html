<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --noir: #0d0d0d;
            --charcoal: #1a1a1a;
            --slate: #2d2d2d;
            --ash: #4a4a4a;
            --ghost: #e8e8e8;
            --paper: #f5f5f5;
            --lime: #d4ff00;
            --cyan: #00fff5;
            --coral: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--noir);
            color: var(--ghost);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(212, 255, 0, 0.02) 2px,
                    rgba(212, 255, 0, 0.02) 4px
                );
            pointer-events: none;
            z-index: 1;
        }

        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .masthead {
            margin-bottom: 4rem;
            text-align: center;
            position: relative;
        }

        .masthead::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--lime);
            box-shadow: 0 0 20px var(--lime);
        }

        .date-header {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--lime), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(212, 255, 0, 0.4)); }
            to { filter: drop-shadow(0 0 40px rgba(0, 255, 245, 0.6)); }
        }

        .tagline {
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            color: var(--ash);
            text-transform: uppercase;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding: 1.5rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
            border-radius: 2px;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--lime);
            color: var(--lime);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--lime);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .btn:hover::before {
            left: 0;
        }

        .btn:hover {
            color: var(--noir);
            box-shadow: 0 0 20px rgba(212, 255, 0, 0.4);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            border-color: var(--ash);
            color: var(--ash);
        }

        .btn-secondary::before {
            background: var(--ash);
        }

        .btn-danger {
            border-color: var(--coral);
            color: var(--coral);
        }

        .btn-danger::before {
            background: var(--coral);
        }

        .section {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--lime);
            padding: 2rem;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        .section.stories {
            border-left-color: var(--gold);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate);
        }

        .section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: var(--lime);
        }

        .section.stories .section-title {
            color: var(--gold);
        }

        .section-actions {
            display: flex;
            gap: 0.5rem;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: 1px solid var(--slate);
            color: var(--ash);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .icon-btn:hover {
            border-color: var(--lime);
            color: var(--lime);
            background: rgba(212, 255, 0, 0.05);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .task {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid transparent;
            transition: all 0.2s;
            position: relative;
        }

        .task::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--lime);
            transform: scaleY(0);
            transition: transform 0.2s;
        }

        .task:hover::before {
            transform: scaleY(1);
        }

        .task:hover {
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
        }

        .task.completed {
            opacity: 0.5;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: var(--ash);
        }

        .checkbox {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--ash);
            background: transparent;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .checkbox:hover {
            border-color: var(--lime);
        }

        .checkbox:checked {
            background: var(--lime);
            border-color: var(--lime);
        }

        .checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--noir);
            font-weight: 600;
            font-size: 0.875rem;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            word-break: break-word;
            color: var(--ghost);
            font-size: 0.9375rem;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid;
        }

        .badge-daily {
            color: var(--lime);
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.1);
        }

        .badge-onetime {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(0, 255, 245, 0.1);
        }

        .add-task-form {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .task-input {
            flex: 1;
            min-width: 250px;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .task-input:focus {
            outline: none;
            border-color: var(--lime);
            background: rgba(212, 255, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .task-input::placeholder {
            color: var(--ash);
        }

        .type-toggle {
            display: flex;
            background: var(--slate);
            border: 1px solid var(--ash);
        }

        .type-option {
            padding: 0.875rem 1.25rem;
            background: transparent;
            border: none;
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 1px solid var(--ash);
        }

        .type-option:last-child {
            border-right: none;
        }

        .type-option.active {
            background: var(--lime);
            color: var(--noir);
        }

        .type-option:not(.active):hover {
            background: rgba(212, 255, 0, 0.1);
            color: var(--lime);
        }

        .story-field {
            margin-bottom: 1.5rem;
        }

        .story-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gold);
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .story-textarea {
            width: 100%;
            min-height: 100px;
            padding: 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            resize: vertical;
            transition: all 0.2s;
        }

        .story-textarea:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .auth-screen {
            max-width: 450px;
            margin: 6rem auto;
            padding: 3rem;
            background: var(--charcoal);
            border: 1px solid var(--slate);
        }

        .auth-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            color: var(--lime);
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--ash);
        }

        .input-field {
            width: 100%;
            padding: 0.875rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ghost);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--lime);
            box-shadow: 0 0 0 3px rgba(212, 255, 0, 0.1);
        }

        .archive {
            margin-bottom: 2.5rem;
            background: var(--charcoal);
            border-left: 4px solid var(--cyan);
            padding: 2rem;
        }

        .archive-dates {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .date-btn {
            padding: 0.5rem 1rem;
            background: var(--slate);
            border: 1px solid var(--ash);
            color: var(--ash);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .date-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .date-btn.active {
            background: var(--cyan);
            color: var(--noir);
            border-color: var(--cyan);
        }

        .archive-day-title {
            color: var(--cyan);
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .archive-section {
            margin-bottom: 1.5rem;
        }

        .archive-section-title {
            color: var(--lime);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .message {
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            border-left: 4px solid;
        }

        .message-error {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--coral);
            color: var(--coral);
        }

        .message-success {
            background: rgba(212, 255, 0, 0.1);
            border-color: var(--lime);
            color: var(--lime);
        }

        .loading {
            text-align: center;
            padding: 6rem 2rem;
            font-size: 1.25rem;
            color: var(--cyan);
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 2rem 1rem;
            }

            .date-header {
                font-size: 2rem;
            }

            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .task {
                flex-wrap: wrap;
            }

            .task-meta {
                width: 100%;
                justify-content: space-between;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // CONFIGURATION - Replace with your Supabase credentials
        const SUPABASE_URL = 'https://kjhlokwfiffsllafyvnj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqaGxva3dmaWZmc2xsYWZ5dm5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjUzMTUsImV4cCI6MjA5MDA0MTMxNX0.-mflvRFi9yOP7aoFJPHfrFTc-vY8xee1u5dnQbVI2ME';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Get current date in EST timezone
        function getCurrentDate() {
            const now = new Date();
            const estDate = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
            return estDate.toISOString().split('T')[0];
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [sections, setSections] = useState([]);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            const [showArchive, setShowArchive] = useState(false);

            useEffect(() => {
                checkUser();
                
                const { data: authListener } = supabase.auth.onAuthStateChange((event, session) => {
                    setUser(session?.user || null);
                    if (session?.user) {
                        loadData();
                    }
                });

                return () => {
                    authListener?.subscription?.unsubscribe();
                };
            }, []);

            async function checkUser() {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    setUser(session?.user || null);
                    
                    if (session?.user) {
                        await loadData();
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }

            async function loadData() {
                try {
                    const today = getCurrentDate();
                    const user = (await supabase.auth.getUser()).data.user;
                    
                    // Ensure tasks exist for today
                    await ensureTasksForToday();
                    
                    // Load sections
                    const { data: sectionsData, error: sectionsError } = await supabase
                        .from('sections')
                        .select('*')
                        .eq('user_id', user.id)
                        .order('order_index', { ascending: true });

                    if (sectionsError) throw sectionsError;

                    // Load tasks for today
                    const { data: tasksData, error: tasksError } = await supabase
                        .from('tasks')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('date', today)
                        .order('created_at', { ascending: true });

                    if (tasksError) throw tasksError;

                    setSections((sectionsData || []).map(section => ({
                        ...section,
                        tasks: (tasksData || []).filter(t => t.section_id === section.id)
                    })));

                } catch (err) {
                    setError(`Failed to load data: ${err.message}`);
                }
            }

            async function ensureTasksForToday() {
                try {
                    const today = getCurrentDate();
                    const user = (await supabase.auth.getUser()).data.user;
                    
                    // Check if tasks already exist for today
                    const { data: existingTasks } = await supabase
                        .from('tasks')
                        .select('id')
                        .eq('user_id', user.id)
                        .eq('date', today)
                        .limit(1);

                    // If tasks exist, we're done
                    if (existingTasks && existingTasks.length > 0) {
                        return;
                    }

                    // Get all templates (these are ONLY daily tasks)
                    const { data: templates } = await supabase
                        .from('task_templates')
                        .select('*')
                        .eq('user_id', user.id);

                    // No templates means this is first use or all tasks were deleted
                    if (!templates || templates.length === 0) {
                        return;
                    }

                    // Create today's tasks from templates
                    const tasksToCreate = templates.map(template => ({
                        user_id: user.id,
                        section_id: template.section_id,
                        text: template.text,
                        completed: false,
                        date: today,
                        template_id: template.id
                    }));

                    const { error } = await supabase
                        .from('tasks')
                        .insert(tasksToCreate);

                    // Error 23505 = unique constraint violation (tasks already exist, that's fine)
                    if (error && error.code !== '23505') {
                        throw error;
                    }

                } catch (err) {
                    console.error('Error ensuring tasks:', err);
                }
            }

            if (loading) {
                return <div className="loading">Loading System...</div>;
            }

            if (!user) {
                return <AuthScreen />;
            }

            return (
                <MainApp 
                    sections={sections}
                    setSections={setSections}
                    loadData={loadData}
                    error={error}
                    setError={setError}
                    success={success}
                    setSuccess={setSuccess}
                    showArchive={showArchive}
                    setShowArchive={setShowArchive}
                />
            );
        }

        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState(null);

            async function handleAuth(e) {
                e.preventDefault();
                setError(null);

                try {
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.auth.signUp({ email, password });
                        if (error) throw error;
                        alert('Check your email to confirm your account!');
                    }
                } catch (error) {
                    setError(error.message);
                }
            }

            return (
                <div className="auth-screen">
                    <h1 className="auth-title">{isLogin ? 'Login' : 'Sign Up'}</h1>
                    {error && <div className="message message-error">{error}</div>}
                    <form onSubmit={handleAuth}>
                        <div className="input-group">
                            <label className="input-label">Email</label>
                            <input
                                type="email"
                                className="input-field"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                required
                            />
                        </div>
                        <div className="input-group">
                            <label className="input-label">Password</label>
                            <input
                                type="password"
                                className="input-field"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                required
                            />
                        </div>
                        <button type="submit" className="btn" style={{width: '100%', marginBottom: '0.75rem'}}>
                            {isLogin ? 'Login' : 'Sign Up'}
                        </button>
                        <button
                            type="button"
                            className="btn btn-secondary"
                            style={{width: '100%'}}
                            onClick={() => setIsLogin(!isLogin)}
                        >
                            {isLogin ? 'Need an account?' : 'Have an account?'}
                        </button>
                    </form>
                </div>
            );
        }

        function MainApp({ sections, setSections, loadData, error, setError, success, setSuccess, showArchive, setShowArchive }) {
            const [showNewSection, setShowNewSection] = useState(false);
            const [newSectionName, setNewSectionName] = useState('');

            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'America/New_York'
            });

            async function addSection(e) {
                e.preventDefault();
                if (!newSectionName.trim()) return;

                try {
                    const user = (await supabase.auth.getUser()).data.user;
                    const { data, error } = await supabase
                        .from('sections')
                        .insert([{
                            user_id: user.id,
                            name: newSectionName,
                            order_index: sections.length
                        }])
                        .select();

                    if (error) throw error;

                    setSections([...sections, { ...data[0], tasks: [] }]);
                    setNewSectionName('');
                    setShowNewSection(false);
                    setSuccess('Section created!');
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(err.message);
                }
            }

            async function deleteSection(sectionId) {
                if (!confirm('Delete this section and all its tasks?')) return;

                try {
                    const { error } = await supabase
                        .from('sections')
                        .delete()
                        .eq('id', sectionId);

                    if (error) throw error;

                    setSections(sections.filter(s => s.id !== sectionId));
                    setSuccess('Section deleted!');
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(err.message);
                }
            }

            return (
                <div className="app-container">
                    <header className="masthead">
                        <h1 className="date-header">{today}</h1>
                        <p className="tagline">Task Protocol</p>
                    </header>

                    <div className="control-panel">
                        <div className="control-group">
                            <button className="btn" onClick={() => setShowNewSection(!showNewSection)}>
                                + New Section
                            </button>
                            <button 
                                className={showArchive ? "btn" : "btn btn-secondary"}
                                onClick={() => setShowArchive(!showArchive)}
                            >
                                {showArchive ? 'Hide Archive' : 'View Archive'}
                            </button>
                        </div>
                        <button className="btn btn-secondary" onClick={() => supabase.auth.signOut()}>
                            Sign Out
                        </button>
                    </div>

                    {error && <div className="message message-error">❌ {error}</div>}
                    {success && <div className="message message-success">✓ {success}</div>}

                    {showNewSection && (
                        <div className="section" style={{marginBottom: '2.5rem'}}>
                            <form onSubmit={addSection}>
                                <div className="input-group">
                                    <label className="input-label">Section Name</label>
                                    <input
                                        type="text"
                                        className="input-field"
                                        value={newSectionName}
                                        onChange={(e) => setNewSectionName(e.target.value)}
                                        placeholder="e.g., Work, Personal, Health"
                                        autoFocus
                                    />
                                </div>
                                <div style={{display: 'flex', gap: '0.75rem', marginTop: '1rem'}}>
                                    <button type="submit" className="btn">Create</button>
                                    <button 
                                        type="button" 
                                        className="btn btn-secondary"
                                        onClick={() => setShowNewSection(false)}
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {showArchive && <Archive />}

                    {sections.filter(s => s.name !== 'Stories').map((section, index) => (
                        <div 
                            key={section.id} 
                            className="section"
                            style={{animationDelay: `${index * 0.1}s`}}
                        >
                            <Section
                                section={section}
                                loadData={loadData}
                                deleteSection={deleteSection}
                                setError={setError}
                            />
                        </div>
                    ))}

                    <StoriesSection setError={setError} setSuccess={setSuccess} />
                </div>
            );
        }

        function Section({ section, loadData, deleteSection, setError }) {
            const [tasks, setTasks] = useState(section.tasks || []);
            const [newTaskText, setNewTaskText] = useState('');
            const [taskType, setTaskType] = useState('daily');

            useEffect(() => {
                setTasks(section.tasks || []);
            }, [section.tasks]);

            async function addTask(e) {
                e.preventDefault();
                if (!newTaskText.trim()) return;

                const today = getCurrentDate();
                const user = (await supabase.auth.getUser()).data.user;

                try {
                    if (taskType === 'daily') {
                        // DAILY TASK: Create template + today's instance
                        const { data: templateData, error: templateError } = await supabase
                            .from('task_templates')
                            .insert([{
                                user_id: user.id,
                                section_id: section.id,
                                text: newTaskText
                            }])
                            .select();

                        if (templateError) throw templateError;

                        // Create today's task
                        const { data: taskData, error: taskError } = await supabase
                            .from('tasks')
                            .insert([{
                                user_id: user.id,
                                section_id: section.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: templateData[0].id
                            }])
                            .select();

                        if (taskError) throw taskError;
                        
                        setTasks([...tasks, taskData[0]]);
                    } else {
                        // ONE-TIME TASK: No template, just today's task
                        const { data: taskData, error: taskError } = await supabase
                            .from('tasks')
                            .insert([{
                                user_id: user.id,
                                section_id: section.id,
                                text: newTaskText,
                                completed: false,
                                date: today,
                                template_id: null
                            }])
                            .select();

                        if (taskError) throw taskError;
                        
                        setTasks([...tasks, taskData[0]]);
                    }

                    setNewTaskText('');
                } catch (err) {
                    setError(err.message);
                }
            }

            async function toggleTask(taskId, completed) {
                try {
                    const { error } = await supabase
                        .from('tasks')
                        .update({ completed })
                        .eq('id', taskId);

                    if (error) throw error;

                    setTasks(tasks.map(t => t.id === taskId ? { ...t, completed } : t));
                } catch (err) {
                    setError(err.message);
                }
            }

            async function deleteTask(taskId) {
                const task = tasks.find(t => t.id === taskId);
                
                try {
                    // Delete the task
                    const { error } = await supabase
                        .from('tasks')
                        .delete()
                        .eq('id', taskId);

                    if (error) throw error;

                    // If it's a DAILY task, delete the template too
                    // This prevents it from regenerating tomorrow
                    if (task?.template_id) {
                        await supabase
                            .from('task_templates')
                            .delete()
                            .eq('id', task.template_id);
                    }

                    setTasks(tasks.filter(t => t.id !== taskId));
                } catch (err) {
                    setError(err.message);
                }
            }

            return (
                <>
                    <div className="section-header">
                        <h2 className="section-title">{section.name}</h2>
                        <div className="section-actions">
                            <button 
                                className="icon-btn"
                                onClick={() => deleteSection(section.id)}
                                title="Delete section"
                            >
                                ✕
                            </button>
                        </div>
                    </div>

                    <ul className="task-list">
                        {tasks.map(task => (
                            <li key={task.id} className={`task ${task.completed ? 'completed' : ''}`}>
                                <input
                                    type="checkbox"
                                    className="checkbox"
                                    checked={task.completed}
                                    onChange={(e) => toggleTask(task.id, e.target.checked)}
                                />
                                <div className="task-content">
                                    <span className="task-text">{task.text}</span>
                                </div>
                                <div className="task-meta">
                                    <span className={task.template_id ? 'badge badge-daily' : 'badge badge-onetime'}>
                                        {task.template_id ? 'Daily' : 'One-Time'}
                                    </span>
                                    <button 
                                        className="icon-btn"
                                        onClick={() => deleteTask(task.id)}
                                        title="Delete task"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </li>
                        ))}
                    </ul>

                    <form className="add-task-form" onSubmit={addTask}>
                        <input
                            type="text"
                            className="task-input"
                            value={newTaskText}
                            onChange={(e) => setNewTaskText(e.target.value)}
                            placeholder="Add new task..."
                        />
                        <div className="type-toggle">
                            <button
                                type="button"
                                className={`type-option ${taskType === 'daily' ? 'active' : ''}`}
                                onClick={() => setTaskType('daily')}
                            >
                                Daily
                            </button>
                            <button
                                type="button"
                                className={`type-option ${taskType === 'one-time' ? 'active' : ''}`}
                                onClick={() => setTaskType('one-time')}
                            >
                                One-Time
                            </button>
                        </div>
                        <button type="submit" className="btn">Add</button>
                    </form>
                </>
            );
        }

        function StoriesSection({ setError, setSuccess }) {
            const [stories, setStories] = useState({
                different: '',
                tension: '',
                detail: ''
            });

            useEffect(() => {
                loadStories();
            }, []);

            async function loadStories() {
                try {
                    const today = getCurrentDate();
                    const user = (await supabase.auth.getUser()).data.user;

                    const { data, error } = await supabase
                        .from('stories')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('date', today)
                        .single();

                    if (error && error.code !== 'PGRST116') {
                        throw error;
                    }

                    if (data) {
                        setStories({
                            different: data.different || '',
                            tension: data.tension || '',
                            detail: data.detail || ''
                        });
                    }
                } catch (err) {
                    console.error('Error loading stories:', err);
                }
            }

            async function saveStories() {
                try {
                    const today = getCurrentDate();
                    const user = (await supabase.auth.getUser()).data.user;

                    const { error } = await supabase
                        .from('stories')
                        .upsert({
                            user_id: user.id,
                            date: today,
                            different: stories.different,
                            tension: stories.tension,
                            detail: stories.detail
                        }, {
                            onConflict: 'user_id,date'
                        });

                    if (error) throw error;

                    setSuccess('Stories saved!');
                    setTimeout(() => setSuccess(null), 3000);
                } catch (err) {
                    setError(err.message);
                }
            }

            return (
                <div className="section stories">
                    <div className="section-header">
                        <h2 className="section-title">📖 Stories</h2>
                    </div>

                    <div className="story-field">
                        <label className="story-label">
                            What was different, unexpected, or slightly off today?
                        </label>
                        <textarea
                            className="story-textarea"
                            value={stories.different}
                            onChange={(e) => setStories({ ...stories, different: e.target.value })}
                            placeholder="Write your thoughts..."
                        />
                    </div>

                    <div className="story-field">
                        <label className="story-label">
                            What moment made you feel something or had tension?
                        </label>
                        <textarea
                            className="story-textarea"
                            value={stories.tension}
                            onChange={(e) => setStories({ ...stories, tension: e.target.value })}
                            placeholder="Write your thoughts..."
                        />
                    </div>

                    <div className="story-field">
                        <label className="story-label">
                            What's one specific detail you'll forget by tomorrow?
                        </label>
                        <textarea
                            className="story-textarea"
                            value={stories.detail}
                            onChange={(e) => setStories({ ...stories, detail: e.target.value })}
                            placeholder="Write your thoughts..."
                        />
                    </div>

                    <button className="btn" onClick={saveStories}>
                        Save Stories
                    </button>
                </div>
            );
        }

        function Archive() {
            const [dates, setDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [archiveData, setArchiveData] = useState(null);

            useEffect(() => {
                loadDates();
            }, []);

            async function loadDates() {
                try {
                    const user = (await supabase.auth.getUser()).data.user;
                    
                    const { data: taskDates } = await supabase
                        .from('tasks')
                        .select('date')
                        .eq('user_id', user.id)
                        .order('date', { ascending: false });

                    const { data: storyDates } = await supabase
                        .from('stories')
                        .select('date')
                        .eq('user_id', user.id)
                        .order('date', { ascending: false });

                    const allDates = new Set([
                        ...(taskDates?.map(t => t.date) || []),
                        ...(storyDates?.map(s => s.date) || [])
                    ]);

                    const sortedDates = Array.from(allDates).sort((a, b) => b.localeCompare(a));
                    setDates(sortedDates.slice(0, 30));
                    
                    if (sortedDates.length > 0) {
                        loadArchiveForDate(sortedDates[0]);
                    }
                } catch (err) {
                    console.error('Error loading dates:', err);
                }
            }

            async function loadArchiveForDate(date) {
                setSelectedDate(date);
                
                try {
                    const user = (await supabase.auth.getUser()).data.user;

                    const { data: tasks } = await supabase
                        .from('tasks')
                        .select('*, sections(name)')
                        .eq('user_id', user.id)
                        .eq('date', date);

                    const { data: stories } = await supabase
                        .from('stories')
                        .select('*')
                        .eq('user_id', user.id)
                        .eq('date', date)
                        .single();

                    const tasksBySection = {};
                    tasks?.forEach(task => {
                        const sectionName = task.sections?.name || 'Unknown';
                        if (!tasksBySection[sectionName]) {
                            tasksBySection[sectionName] = [];
                        }
                        tasksBySection[sectionName].push(task);
                    });

                    setArchiveData({ tasks: tasksBySection, stories });
                } catch (err) {
                    console.error('Error loading archive:', err);
                }
            }

            return (
                <div className="archive">
                    <div className="section-header">
                        <h2 className="section-title" style={{color: 'var(--cyan)'}}>📚 Archive</h2>
                    </div>

                    <div className="archive-dates">
                        {dates.map(date => (
                            <button
                                key={date}
                                className={`date-btn ${selectedDate === date ? 'active' : ''}`}
                                onClick={() => loadArchiveForDate(date)}
                            >
                                {new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
                                    month: 'short',
                                    day: 'numeric'
                                })}
                            </button>
                        ))}
                    </div>

                    {archiveData && selectedDate && (
                        <div>
                            <h3 className="archive-day-title">
                                {new Date(selectedDate + 'T00:00:00').toLocaleDateString('en-US', {
                                    weekday: 'long',
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric'
                                })}
                            </h3>

                            {Object.keys(archiveData.tasks).length > 0 && (
                                <div>
                                    {Object.entries(archiveData.tasks).map(([sectionName, tasks]) => (
                                        <div key={sectionName} className="archive-section">
                                            <h4 className="archive-section-title">{sectionName}</h4>
                                            <ul className="task-list">
                                                {tasks.map(task => (
                                                    <li key={task.id} className={`task ${task.completed ? 'completed' : ''}`}>
                                                        <input
                                                            type="checkbox"
                                                            className="checkbox"
                                                            checked={task.completed}
                                                            disabled
                                                        />
                                                        <div className="task-content">
                                                            <span className="task-text">{task.text}</span>
                                                        </div>
                                                        <span className={task.template_id ? 'badge badge-daily' : 'badge badge-onetime'}>
                                                            {task.template_id ? 'Daily' : 'One-Time'}
                                                        </span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {archiveData.stories && (
                                <div className="archive-section">
                                    <h4 className="archive-section-title" style={{color: 'var(--gold)'}}>
                                        📖 Stories
                                    </h4>
                                    {archiveData.stories.different && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What was different?
                                            </div>
                                            <div>{archiveData.stories.different}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.tension && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What had tension?
                                            </div>
                                            <div>{archiveData.stories.tension}</div>
                                        </div>
                                    )}
                                    {archiveData.stories.detail && (
                                        <div style={{marginBottom: '1rem'}}>
                                            <div style={{color: 'var(--ash)', fontSize: '0.75rem', marginBottom: '0.5rem'}}>
                                                What specific detail?
                                            </div>
                                            <div>{archiveData.stories.detail}</div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
